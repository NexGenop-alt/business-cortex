company:
  name: "Example Company"
  slug: "example-company"
  owner_name: "Business Owner"
  industry: "Local services"
  mission: "Serve customers reliably and grow with better follow-up and operations."
  primary_goal: "Improve lead follow-up, internal visibility, and operational consistency."

system:
  name: "Business Cortex"
  base_output_dir: "/opt/business-cortex/clients"
  principle: >
    The orchestrator keeps the company-wide operating picture. Specialist agents
    keep isolated memories and receive only task-specific handoff packets.

agents:
  orchestrator:
    display_name: "Operator"
    profile: "example-operator"
    title: "CEO / Orchestrator"
    reports_to: "Business Owner"
    scope:
      - strategy
      - company-wide context
      - agent routing
      - workflow design
      - verification

  techops:
    display_name: "TechOps"
    profile: "example-techops"
    title: "Technology Operations"
    scope:
      - server and systems
      - integrations
      - access and security
      - troubleshooting
      - backups and logs

  scout:
    display_name: "Scout"
    profile: "example-scout"
    title: "Capability Discovery"
    scope:
      - skill discovery
      - tool research
      - workflow capability expansion

  assistant:
    display_name: "Assistant"
    profile: "example-assistant"
    title: "Executive Assistant"
    scope:
      - calendar
      - reminders
      - follow-ups
      - inbox and workspace support

  sales:
    display_name: "Revenue"
    profile: "example-sales"
    title: "Sales / Revenue"
    scope:
      - sales follow-up
      - outreach drafts
      - objections
      - proposals
      - close plans


memory_architecture:
  source_of_truth:
    type: "private_brain"
    label: "Client Private Brain"
    purpose: "Shared searchable company knowledge for all specialist agents."
    local_url: "http://127.0.0.1:42110/"
    public_route: "https://brain.client-domain.example/khoj/"
    stores_client_data: true
  skill_tree:
    label: "Client Skill Tree"
    purpose: "Visual/organizational map of installed skills, workflows, and agent capabilities."
  orchestrator:
    runtime_primary: "hermes"
    can_access_private_brain: true
    can_access_skill_tree: true
    hermes_memory_enabled: true
    rule: >
      The orchestrator may keep runtime/session continuity and company-wide coordination notes,
      but the shared client knowledge source is the private brain.
  specialists:
    private_brain_primary: true
    skill_tree_primary: true
    hermes_memory_enabled: false
    hermes_user_profile_enabled: false
    write_approval: true
    rule: >
      Specialist agents use the private brain and skill tree as their primary knowledge layer.
      They do not rely on profile-local memory as the client brain and they do not merge
      memories across roles.
  ingestion_policy:
    raw_profile_memory_upload_allowed: false
    client_approved_documents_only: true
    preserve_role_boundaries: true
    secrets_allowed: false

approval_policy:
  drafts_allowed: true
  external_send_requires_approval: true
  calendar_changes_require_approval: true
  destructive_system_changes_require_approval: true
  memory_merges_require_approval: true

integrations:
  google_workspace:
    enabled: false
  microsoft_365:
    enabled: false
  crm:
    enabled: false
    name: ""
